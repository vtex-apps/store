- name: store
  referenceId: 6BYLNHZR
  pipelines:
    - name: techdocs-v1
      parameters:
        entityReference: default/component/store
        indexFile: README.md
      when:
        - event: push
          source: branch
          regex: master
          path:
            - "docs/**"
            - ".vtex/deployment.yaml"
            - ".vtex/deployment.json"
            - "README.md"
